<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Угадай мем</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;
    background:#141418;color:#ddd;
    display:flex;justify-content:center;align-items:center;padding:8px;user-select:none
}
.scr{
    width:100%;max-width:680px;height:100%;
    background:#1c1c24;border-radius:12px;padding:24px;
    display:none;flex-direction:column;border:1px solid #2a2a34;
    align-items:center;justify-content:center;text-align:center;gap:16px
}
.scr.show{display:flex}

.menu h1{font-size:36px;font-weight:800;color:#e94560;letter-spacing:-1px}
.menu p{font-size:14px;color:#777;margin-bottom:8px}
.menu .btns{display:flex;flex-direction:column;gap:10px;width:220px}
.menu .btns button{
    padding:12px;border:none;border-radius:8px;font-size:14px;font-weight:600;
    cursor:pointer;text-transform:uppercase;letter-spacing:1px
}
.menu .btns .play{background:#e94560;color:#fff}
.menu .btns .play:hover{background:#d63851}
.menu .btns .opt{background:#2a2a34;color:#888;font-size:11px}
.menu .btns .opt:hover{background:#333}
.menu .tip{margin-top:8px;font-size:11px;color:#555;line-height:1.5}
.menu .tip span{color:#e94560}

.game{display:none;flex-direction:column;padding:12px 14px;gap:6px}
.game.show{display:flex}
.hd{display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:6px}
.hd .tm{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;color:#eee;min-width:60px}
.hd .tm.warn{color:#e74c3c}
.hd .lv{font-size:14px;min-width:50px;text-align:center}
.hd .lv .on{color:#e74c3c}
.hd .lv .off{color:#333}
.hd .sc2{font-size:13px;color:#777;background:#252530;padding:2px 10px;border-radius:10px;white-space:nowrap}
.hd .sc2 span{color:#eee;font-weight:600}
.hd .mus{
    font-size:14px;cursor:pointer;color:#555;background:#252530;
    width:28px;height:28px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;flex-shrink:0
}
.hd .mus.on{color:#e94560}
.bar{height:2px;background:#252530;border-radius:2px;flex-shrink:0}
.bar div{height:100%;width:0%;background:linear-gradient(90deg,#e94560,#f0c040);border-radius:2px;transition:width .4s}
.desc{flex-shrink:0;background:#22222c;border-radius:8px;padding:8px 12px;text-align:center;border-left:3px solid #e94560}
.desc small{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#e94560;opacity:.7;display:block;margin-bottom:2px}
.desc p{font-size:14px;line-height:1.4;min-height:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;flex:1;min-height:0}
.grid .opt{
    position:relative;border-radius:8px;overflow:hidden;cursor:pointer;
    border:2px solid #2a2a34;background:#0d0d12;
    display:flex;align-items:center;justify-content:center
}
.grid .opt:hover{border-color:#555}
.grid .opt img{display:block;width:100%;height:100%;object-fit:contain}
.grid .opt.correct{border-color:#2ecc71;background:#0a1f12}
.grid .opt.wrong{border-color:#e74c3c;background:#1f0a0a}
.grid .opt.disabled{pointer-events:none}
.grid .opt.dim:not(.correct):not(.wrong){opacity:.2}
.grid .opt .tag{
    position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;
    display:none;align-items:center;justify-content:center;font-size:13px;font-weight:700;z-index:2
}
.grid .opt.correct .tag{display:flex;background:#2ecc71;color:#fff}
.grid .opt.wrong .tag{display:flex;background:#e74c3c;color:#fff}
.btm{flex-shrink:0;display:flex;align-items:center;gap:8px}
.btm .hint{font-size:11px;color:#555;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btm .res{font-size:14px;font-weight:700;min-width:50px;text-align:center;flex-shrink:0}
.btm .res.ok{color:#2ecc71}
.btm .res.no{color:#e74c3c}
.btm button{
    padding:7px 16px;border:none;border-radius:6px;font-size:12px;font-weight:600;
    cursor:pointer;text-transform:uppercase;letter-spacing:.5px;flex-shrink:0
}
.btm .nxt{background:#e94560;color:#fff}
.btm .nxt:disabled{opacity:.2;cursor:default}
.btm .rst2{background:#2a2a34;color:#888;font-size:10px;padding:7px 10px}
.btm .rst2:hover{background:#333}

.over{
    display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:12px;padding:24px
}
.over.show{display:flex}
.over .icon{font-size:48px}
.over h2{font-size:24px;font-weight:700}
.over .st{font-size:13px;color:#888;line-height:1.6}
.over .st span{color:#eee;font-weight:600}
.over button{
    padding:12px 32px;border:none;border-radius:8px;font-size:14px;font-weight:600;
    cursor:pointer;text-transform:uppercase;letter-spacing:1px;margin-top:4px
}
.over .again{background:#e94560;color:#fff}
.over .again:hover{background:#d63851}
.over .menu-btn{background:#2a2a34;color:#888;font-size:11px}
.over .menu-btn:hover{background:#333}

.modal{
    display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
    align-items:center;justify-content:center;padding:16px
}
.modal.show{display:flex}
.modal-inner{
    background:#1c1c24;border-radius:12px;padding:20px;
    width:100%;max-width:380px;border:1px solid #2a2a34;
    display:flex;flex-direction:column;gap:12px;max-height:90vh;overflow-y:auto
}
.modal-inner h3{font-size:15px;color:#e94560}
.modal-inner label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:1px}
.modal-inner input[type="text"]{
    background:#252530;border:1px solid #2a2a34;border-radius:6px;
    padding:8px 10px;font-size:13px;color:#ddd;outline:none;width:100%;font-family:inherit
}
.modal-inner input[type="text"]:focus{border-color:#e94560}
.modal-inner input[type="file"]{font-size:12px;color:#888}
.modal-inner .prev{
    width:100%;aspect-ratio:1;border-radius:8px;overflow:hidden;
    background:#0d0d12;display:flex;align-items:center;justify-content:center;border:1px dashed #2a2a34
}
.modal-inner .prev img{max-width:100%;max-height:100%;object-fit:contain}
.modal-inner .prev .ph{font-size:11px;color:#555}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{
    padding:8px 20px;border:none;border-radius:6px;font-size:12px;
    font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.5px
}
.modal-btns .m-save{background:#e94560;color:#fff}
.modal-btns .m-save:disabled{opacity:.3;cursor:default}
.modal-btns .m-cancel{background:#2a2a34;color:#888}
.modal-btns .m-cancel:hover{background:#333}
.mlist{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto}
.mlist::-webkit-scrollbar{width:3px}
.mlist::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.mlist-it{
    display:flex;align-items:center;gap:6px;background:#252530;
    border-radius:6px;padding:4px 6px;font-size:11px
}
.mlist-it img{width:28px;height:28px;object-fit:cover;border-radius:4px;flex-shrink:0}
.mlist-it span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#aaa}
.mlist-it button{border:none;background:none;cursor:pointer;font-size:13px;padding:2px 4px;border-radius:4px;flex-shrink:0}
.mlist-it .mld{color:#e74c3c}
.mlist-it .mld:hover{background:#3a1a1a}
</style>
</head>
<body>

<div class="scr menu show" id="menuScr">
    <h1>угадай мем</h1>
    <p>угадай мем по описанию</p>
    <div class="btns">
        <button class="play" id="startBtn">играть</button>
        <button class="opt" id="addMemeBtn">+ добавить мем</button>
    </div>
    <div class="tip">
        <span>43 мема</span> • таймер 3 мин • 3 жизни<br>
        угадай все мемы чтобы победить
    </div>
</div>

<div class="game show" id="gameScr">
    <div class="hd">
        <div class="tm" id="timer">3:00</div>
        <div class="lv" id="lives">❤️❤️❤️</div>
        <div class="sc2"><span id="s">0</span>/<span id="t">0</span></div>
        <div class="mus" id="musBtn">♫</div>
    </div>
    <div class="bar"><div id="bar"></div></div>
    <div class="desc">
        <small>что это за мем?</small>
        <p id="desc">—</p>
    </div>
    <div class="grid" id="grid"></div>
    <div class="btm">
        <div class="hint" id="hint">тыкни на картинку</div>
        <div class="res" id="res"></div>
        <button class="nxt" id="nxt" disabled>дальше</button>
        <button class="rst2" id="quitBtn">выход</button>
    </div>
</div>

<div class="scr over" id="winScr">
    <div class="icon">🏆</div>
    <h2 style="color:#2ecc71">ты выиграл!</h2>
    <div class="st" id="winStats"></div>
    <button class="again" id="winAgain">ещё раз</button>
    <button class="menu-btn" id="winMenu">в меню</button>
</div>

<div class="scr over" id="loseScr">
    <div class="icon">💀</div>
    <h2 style="color:#e74c3c">ты проиграл</h2>
    <div class="st" id="loseStats"></div>
    <button class="again" id="loseAgain">попробуй снова</button>
    <button class="menu-btn" id="loseMenu">в меню</button>
</div>

<div class="modal" id="modal">
    <div class="modal-inner">
        <h3 id="mTitle">+ добавить мем</h3>
        <div id="mList"></div>
        <label>описание</label>
        <input type="text" id="mDesc" placeholder="напиши описание">
        <label>картинка / гифка</label>
        <input type="file" id="mFile" accept="image/*">
        <div class="prev" id="mPrev"><span class="ph">превью</span></div>
        <div class="modal-btns">
            <button class="m-cancel" id="mCancel">отмена</button>
            <button class="m-save" id="mSave" disabled>сохранить</button>
        </div>
    </div>
</div>

<audio id="bgm" loop preload="auto" src="https://raw.githubusercontent.com/egoffn1/meme-game/main/memes/Red_Ball_4_-_Menyu_(SkySound.cc).mp3"></audio>

<script>
const GH = 'https://raw.githubusercontent.com/egoffn1/meme-game/main/memes/';
const BUILTIN = [
  { file: GH + '4часа.jpg', desc: '"4 часа утра" — глубокой ночью не спишь' },
  { file: GH + 'mellstroy-bravo.gif', desc: 'Мелстрой говорит "Браво!"' },
  { file: GH + 'mellstroy-мелстрой.gif', desc: 'Мелстрой — стример, казино, неадекват' },
  { file: GH + 'mellstroy.gif', desc: 'Мелстрой — скандальный стример' },
  { file: GH + 'mellstroy1.gif', desc: 'Мелстрой — очередная эмоция' },
  { file: GH + 'wind-face-nature.gif', desc: 'Ветер дует в лицо' },
  { file: GH + 'ава-крт-кобяк.jpg', desc: 'Кобяк из КРТ' },
  { file: GH + 'админ.jpg', desc: 'Мем про администратора' },
  { file: GH + 'ашибачка.jpg', desc: '"Ошибочка вышла!"' },
  { file: GH + 'балашиха.jpg', desc: 'Мем про Балашиху' },
  { file: GH + 'блять-тик-так.jpg', desc: '"Блять, тик-так"' },
  { file: GH + 'блять.jpg', desc: 'Классический "Блять"' },
  { file: GH + 'вейпить.jpg', desc: 'Мем про вейп' },
  { file: GH + 'велясик.jpg', desc: 'Велясик — игрок в Standoff 2' },
  { file: GH + 'водолаз.jpg', desc: 'Мем про водолаза' },
  { file: GH + 'фог-мурино.gif', desc: 'Фог из Мурино — туман, Мелстрой' },
  { file: GH + 'бля_братан.jpg', desc: '"Бля, братан"' },
  { file: GH + 'блять_какой_я_тупой.jpg', desc: '"Блять, какой я тупой"' },
  { file: GH + 'всем_привет.jpg', desc: '"Всем привет"' },
  { file: GH + 'выпей_электричество.jpg', desc: '"Выпей электричество"' },
  { file: GH + 'даун.jpg', desc: 'Мем про дауна' },
  { file: GH + 'завтра.jpg', desc: '"Завтра" — вечное откладывание' },
  { file: GH + 'какашки.jpg', desc: 'Туалетный юмор' },
  { file: GH + 'качество.jpg', desc: 'Мем про качество' },
  { file: GH + 'кто_это_.jpg', desc: '"Кто это?"' },
  { file: GH + 'лдьргфва.jpg', desc: 'Рандомный набор букв' },
  { file: GH + 'лобанов.jpg', desc: 'Мем про Лобанова' },
  { file: GH + 'меньет_смотрит_на_тебя.jpg', desc: 'Меньет смотрит на тебя' },
  { file: GH + 'мобилизируем.jpg', desc: 'Мобилизация с ошибкой' },
  { file: GH + 'образ_жизни.jpg', desc: 'Образ жизни' },
  { file: GH + 'оналдо_в_эдите.jpg', desc: 'Оналдо в эдите' },
  { file: GH + 'отморозок.jpg', desc: 'Мем про отморозка' },
  { file: GH + 'ошибка_эволютсыы.jpg', desc: '"Ошибка эволютсыы"' },
  { file: GH + 'писюн_в_масле.jpg', desc: 'Писюн в масле' },
  { file: GH + 'писюн.jpg', desc: 'Сортирный юмор' },
  { file: GH + 'поджарил.jpg', desc: '"Поджарил" оппонента' },
  { file: GH + 'сво.jpg', desc: 'Политический мем' },
  { file: GH + 'сиске.jpg', desc: 'Мем про сиске' },
  { file: GH + 'сискес.jpg', desc: 'Ещё про сискес' },
  { file: GH + 'удали_интернет.jpg', desc: '"Удали интернет"' },
  { file: GH + 'удали_мозг.jpg', desc: '"Удали мозг"' },
  { file: GH + 'удали_телефон.jpg', desc: '"Удали телефон"' },
  { file: GH + 'ы.ик.jpg', desc: 'Абсурд "ы.ик"' },
];

const TIME_LIMIT = 180;
const MAX_LIVES = 3;

let memes = [];
let customMemes = [];
let used = new Set();
let cur = null;
let answered = false;
let score = 0, total = 0, streak = 0, maxStreak = 0;
let lives = MAX_LIVES;
let timeLeft = TIME_LIMIT;
let timerId = null;
let gameRunning = false;

// screens
const menuScr = document.getElementById('menuScr');
const gameScr = document.getElementById('gameScr');
const winScr = document.getElementById('winScr');
const loseScr = document.getElementById('loseScr');

// game elements
const grid = document.getElementById('grid');
const desc = document.getElementById('desc');
const sEl = document.getElementById('s');
const tEl = document.getElementById('t');
const bar = document.getElementById('bar');
const nxt = document.getElementById('nxt');
const hint = document.getElementById('hint');
const res = document.getElementById('res');
const timerEl = document.getElementById('timer');
const livesEl = document.getElementById('lives');
const streakEl = null;
const addBtn = document.getElementById('addMemeBtn');
const quitBtn = document.getElementById('quitBtn');

// modals
const modal = document.getElementById('modal');
const mDesc = document.getElementById('mDesc');
const mFile = document.getElementById('mFile');
const mPrev = document.getElementById('mPrev');
const mSave = document.getElementById('mSave');
const mCancel = document.getElementById('mCancel');
const mList = document.getElementById('mList');
const mTitle = document.getElementById('mTitle');

// music
const bgm = document.getElementById('bgm');
const musBtn = document.getElementById('musBtn');
let musicOn = false;

function showScreen(s) {
    document.querySelectorAll('.scr, .game, .over').forEach(el => el.classList.remove('show'));
    if (s) s.classList.add('show');
}

function shf(a) {
    for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; }
    return a;
}

function beep(freq, dur, vol) {
    try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gain.gain.value = vol;
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
        osc.connect(gain); gain.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + dur);
    } catch (_) {}
}

function pick() {
    const avail = [];
    for (let i = 0; i < memes.length; i++) { if (!used.has(i)) avail.push(i); }
    if (avail.length < 4) return null;
    const shuffled = shf([...avail]);
    const corr = shuffled[0];
    used.add(corr);
    return { corr, opts: shf([corr, ...shuffled.slice(1, 4)]) };
}

function randReward() {
    const r = Math.random();
    if (r < 0.05) return 5;
    if (r < 0.2) return 3;
    if (r < 0.5) return 2;
    return 1;
}

function updateTimer() {
    const m = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    timerEl.textContent = m + ':' + String(sec).padStart(2, '0');
    timerEl.classList.toggle('warn', timeLeft <= 30);
}

function updateLives() {
    livesEl.innerHTML = '';
    for (let i = 0; i < MAX_LIVES; i++) {
        const span = document.createElement('span');
        span.textContent = '❤️';
        span.className = i < lives ? 'on' : 'off';
        livesEl.appendChild(span);
    }
}

function endGame(won) {
    gameRunning = false;
    if (timerId) { clearInterval(timerId); timerId = null; }
    const elapsed = TIME_LIMIT - timeLeft;
    const m = Math.floor(elapsed / 60);
    const sec = elapsed % 60;
    const timeStr = m + ':' + String(sec).padStart(2, '0');
    const pct = total > 0 ? Math.round(score / total * 100) : 0;
    const stats = `время: ${timeStr}<br>очки: ${score}<br>угадано: ${total}/${memes.length}<br>точность: ${pct}%<br>макс стрик: ${maxStreak}`;

    if (won) {
        document.getElementById('winStats').innerHTML = stats;
        showScreen(winScr);
    } else {
        document.getElementById('loseStats').innerHTML = stats;
        showScreen(loseScr);
    }
}

function timerTick() {
    timeLeft--;
    updateTimer();
    if (timeLeft <= 0) {
        endGame(false);
    }
}

function round() {
    if (!gameRunning) return;
    answered = false;
    res.textContent = '';
    res.className = 'res';
    nxt.disabled = true;
    hint.textContent = 'тыкни на картинку';

    const p = pick();
    if (!p) {
        endGame(true);
        return;
    }

    cur = p;
    desc.textContent = memes[cur.corr].desc;
    grid.innerHTML = '';
    for (const idx of cur.opts) {
        const el = document.createElement('div');
        el.className = 'opt';
        el.dataset.i = idx;
        const img = document.createElement('img');
        img.src = memes[idx].file;
        img.alt = '';
        const tag = document.createElement('div');
        tag.className = 'tag';
        el.append(img, tag);
        el.addEventListener('click', () => {
            if (answered || !gameRunning) return;
            answered = true;
            total++;
            let gained = 0;
            document.querySelectorAll('.opt').forEach(o => o.classList.add('disabled', 'dim'));
            if (idx === cur.corr) {
                gained = randReward();
                score += gained;
                streak++;
                if (streak > maxStreak) maxStreak = streak;
                el.classList.remove('dim');
                el.classList.add('correct');
                el.querySelector('.tag').textContent = '✓';
                beep(660, 0.12, 0.15);
                setTimeout(() => beep(880, 0.15, 0.12), 100);
                let txt = 'да';
                if (gained >= 5) txt = '🔥 ДЖЕКПОТ +' + gained;
                else if (gained >= 3) txt = '🔥 КРИТ +' + gained;
                else txt = 'да +' + gained;
                res.textContent = txt;
                res.className = 'res ok';
            } else {
                streak = 0;
                lives--;
                updateLives();
                el.classList.remove('dim');
                el.classList.add('wrong');
                el.querySelector('.tag').textContent = '✗';
                beep(300, 0.2, 0.15);
                document.querySelectorAll('.opt').forEach(o => {
                    if (+o.dataset.i === cur.corr) {
                        o.classList.remove('dim');
                        o.classList.add('correct');
                        o.querySelector('.tag').textContent = '✓';
                    }
                });
                res.textContent = 'нет';
                res.className = 'res no';
                if (lives <= 0) {
                    endGame(false);
                    return;
                }
            }
            sEl.textContent = score;
            tEl.textContent = total;
            bar.style.width = (used.size / memes.length * 100) + '%';
            hint.textContent = memes[cur.corr].desc;
            nxt.disabled = false;
        });
        grid.appendChild(el);
    }
}

function startGame() {
    used = new Set();
    score = 0; total = 0; streak = 0; maxStreak = 0;
    lives = MAX_LIVES;
    timeLeft = TIME_LIMIT;
    gameRunning = true;

    sEl.textContent = '0'; tEl.textContent = '0';
    bar.style.width = '0%';
    res.textContent = ''; res.className = 'res';
    updateTimer();
    updateLives();

    // try fetching custom memes
    memes = [...BUILTIN];
    customMemes = [];
    fetch('/api/memes').then(r => r.json()).then(data => {
        const customFromServer = data.memes.filter(m => !m.builtin);
        for (const c of customFromServer) {
            memes.push({ file: c.file, desc: c.desc });
            customMemes.push(c);
        }
    }).catch(() => {});

    showScreen(gameScr);
    if (timerId) clearInterval(timerId);
    timerId = setInterval(timerTick, 1000);
    round();
}

function goToMenu() {
    gameRunning = false;
    if (timerId) { clearInterval(timerId); timerId = null; }
    showScreen(menuScr);
}

// event listeners
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('winAgain').addEventListener('click', startGame);
document.getElementById('loseAgain').addEventListener('click', startGame);
document.getElementById('winMenu').addEventListener('click', goToMenu);
document.getElementById('loseMenu').addEventListener('click', goToMenu);
quitBtn.addEventListener('click', goToMenu);

nxt.addEventListener('click', () => {
    if (!gameRunning) return;
    round();
});

// music
musBtn.addEventListener('click', () => {
    musicOn = !musicOn;
    musBtn.classList.toggle('on', musicOn);
    if (musicOn) { bgm.volume = 0.12; bgm.play().catch(() => { musicOn = false; musBtn.classList.remove('on'); }); }
    else { bgm.pause(); bgm.currentTime = 0; }
});

// modal
async function loadCustomMemes() {
    try {
        const r = await fetch('/api/memes');
        const data = await r.json();
        customMemes = data.memes.filter(m => !m.builtin);
    } catch (_) { customMemes = []; }
}

function renderMlist() {
    mList.innerHTML = '';
    if (!customMemes.length) return;
    mList.innerHTML = '<div class="mlist">' + customMemes.map((c, i) =>
        `<div class="mlist-it"><img src="${c.file}"><span>${c.desc}</span><button class="mld" data-d="${i}">✕</button></div>`
    ).join('') + '</div>';
    mList.querySelectorAll('.mld').forEach(b => {
        b.addEventListener('click', async () => {
            if (!confirm('удалить мем?')) return;
            await fetch('/api/memes/' + b.dataset.d, { method: 'DELETE' });
            await loadCustomMemes();
            renderMlist();
        });
    });
}

addBtn.addEventListener('click', () => {
    loadCustomMemes().then(() => {
        renderMlist();
        mTitle.textContent = customMemes.length ? `мемы (${customMemes.length})` : '+ добавить мем';
        mDesc.value = ''; mFile.value = '';
        mPrev.innerHTML = '<span class="ph">превью</span>';
        mSave.disabled = true;
        modal.classList.add('show');
    });
});

mCancel.addEventListener('click', () => modal.classList.remove('show'));
mFile.addEventListener('change', () => {
    const file = mFile.files[0];
    if (!file) { mPrev.innerHTML = '<span class="ph">превью</span>'; mSave.disabled = true; return; }
    const reader = new FileReader();
    reader.onload = (e) => { mPrev.innerHTML = `<img src="${e.target.result}">`; mSave.disabled = !mDesc.value.trim(); };
    reader.readAsDataURL(file);
});
mDesc.addEventListener('input', () => { mSave.disabled = !(mDesc.value.trim() && mPrev.querySelector('img')); });
mSave.addEventListener('click', async () => {
    const file = mFile.files[0];
    if (!file || !mDesc.value.trim()) return;
    const form = new FormData();
    form.append('image', file);
    form.append('desc', mDesc.value.trim());
    await fetch('/api/memes', { method: 'POST', body: form });
    modal.classList.remove('show');
});
</script>
</body>
</html>
